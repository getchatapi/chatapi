[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables — set in the Railway dashboard:
#   MASTER_API_KEY  (required)
#   DATABASE_DSN    = file:/data/chatapi.db?_journal_mode=WAL&_busy_timeout=5000
#   ALLOWED_ORIGINS = https://your-frontend.up.railway.app
#
# Add a Volume in the Railway dashboard mounted at /data for SQLite persistence.
